name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install helper script dependencies
        run: pip install -r requirements.txt

      - name: Compile helper scripts
        run: python3 -m py_compile scripts/export-config.py scripts/scan-secrets.py

      - name: Scan for credential signatures
        run: python3 scripts/scan-secrets.py .

      - name: Check for whitespace errors
        run: git diff --check -- . ':(exclude)patches/*.patch'

      - name: Read upstream base
        id: upstream
        run: |
          base=$(tr -d '[:space:]' < UPSTREAM_BASE)
          test -n "$base" || { echo "UPSTREAM_BASE is empty"; exit 1; }
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Check out upstream Hermes Agent
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ steps.upstream.outputs.base }}
          path: hermes-agent

      - name: Verify patch applies cleanly
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/scripts/apply.sh" "$GITHUB_WORKSPACE/hermes-agent"
